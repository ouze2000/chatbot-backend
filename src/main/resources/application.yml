spring:
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        enabled: false          # 채팅은 Anthropic만 사용
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1536        # text-embedding-3-small 차원

  datasource:
    url: jdbc:postgresql://localhost:5432/chatbot
    username: ${DB_USERNAME:chatbot}
    password: ${DB_PASSWORD:chatbot1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:chatbot-jwt-secret-key-must-be-at-least-256-bits-long!!}
    access-token-expiry: 900000       # 15분 (ms)
    refresh-token-expiry: 604800000   # 7일 (ms)
    cookie-secure: ${COOKIE_SECURE:false}      # 운영(HTTPS) 환경에서는 true
    cookie-same-site: ${COOKIE_SAME_SITE:Lax}  # 프론트/백 도메인 다르면 None (cookie-secure=true 필요)
  newsdata:
    api-key: ${NEWSDATA_API_KEY:}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:-}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:4096}
  weather-api-key: ${WEATHER_API_KEY:}
