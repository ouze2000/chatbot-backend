spring:
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        enabled: false          # 채팅은 Anthropic만 사용
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1536        # text-embedding-3-small 차원

  datasource:
    url: jdbc:postgresql://localhost:5432/chatbot
    username: ${DB_USERNAME:chatbot}
    password: ${DB_PASSWORD:chatbot1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:chatbot-jwt-secret-key-must-be-at-least-256-bits-long!!}
    access-token-expiry: 900000       # 15분 (ms)
    refresh-token-expiry: 604800000   # 7일 (ms)
  newsdata:
    api-key: ${NEWSDATA_API_KEY:}
