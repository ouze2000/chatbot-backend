services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbot-db
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "8081:8081"
    environment:
      # DB: localhost 대신 컨테이너명으로 접속
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chatbot
      # API 키: 호스트 환경변수 또는 .env 파일에서 주입
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      NEWSDATA_API_KEY: ${NEWSDATA_API_KEY:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-chatbot-jwt-secret-key-must-be-at-least-256-bits-long!!}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
    volumes:
      - uploads_data:/app/uploads  # 업로드 파일 영구 저장
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../chatbot-frontend
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
